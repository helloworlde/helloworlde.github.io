name: Submit URLs to search engines

on:
  push:
    branches:
      - main
    paths:
      - 'content/**'
  schedule:
    - cron: '0 2 * * 1' # 每周一 UTC 02:00 (北京时间 10:00)
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout submodules
        run: git submodule update --init --recursive --remote --force

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify --enableGitInfo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Submit to Bing
        env:
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
        run: python script/bing.py

      - name: Submit to IndexNow
        env:
          INDEXNOW_API_KEY: ${{ secrets.INDEXNOW_API_KEY }}
        run: python script/indexnow.py
